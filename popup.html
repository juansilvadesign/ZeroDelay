<!DOCTYPE html>
<!-- lang is set to the real UI language by popup.js at startup -->
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <script src="vendor/qrcode.js"></script>
    <script src="popup.js" type="module"></script>
    <title>ZeroDelay</title>
</head>

<body>
    <main id="app" class="app">
        <header class="app-header">
            <div class="brand">
                <div class="brand-text">
                    <h1 id="brand-name" class="brand-name" aria-label="ZeroDelay">Zer<span class="brand-o" aria-hidden="true"></span>Delay</h1>
                    <p id="brand-tagline" class="brand-tagline"></p>
                </div>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="theme-toggle" type="button">
                    <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="4" />
                        <path d="M12 2v2" />
                        <path d="M12 20v2" />
                        <path d="m4.93 4.93 1.41 1.41" />
                        <path d="m17.66 17.66 1.41 1.41" />
                        <path d="M2 12h2" />
                        <path d="M20 12h2" />
                        <path d="m6.34 17.66-1.41 1.41" />
                        <path d="m19.07 4.93-1.41 1.41" />
                    </svg>
                    <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                    </svg>
                </button>
                <button id="coffee-toggle" class="coffee-toggle" type="button" aria-expanded="false"
                    aria-controls="support-panel">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <path d="M4 9h13v5a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5z" />
                        <path d="M17 10h2a2.5 2.5 0 0 1 0 5h-2" />
                        <path class="steam" d="M7 2.5c-.5 1 .5 1.5 0 2.5M11 2.5c-.5 1 .5 1.5 0 2.5M15 2.5c-.5 1 .5 1.5 0 2.5" />
                    </svg>
                    <span id="coffee-label" class="coffee-label"></span>
                </button>
            </div>
        </header>

        <section id="support-cta" class="support-cta">
            <p id="support-cta-text" class="support-cta-text"></p>
            <button id="support-cta-btn" class="support-cta-btn" type="button"></button>
        </section>

        <section id="support-panel" class="support" aria-labelledby="support-title" hidden>
            <div class="support-head">
                <h2 id="support-title" class="support-title"></h2>
                <p id="support-note" class="support-note"></p>
            </div>
            <p id="support-nudge" class="support-nudge" hidden></p>
            <div id="support-amounts" class="support-amounts" role="radiogroup"></div>
            <input id="support-custom" class="support-custom" type="number" min="0" step="0.5" inputmode="decimal"
                hidden />
            <div id="support-pix" class="support-pix">
                <div id="support-qr" class="support-qr" aria-hidden="true"></div>
                <p id="support-scan" class="support-scan"></p>
                <button id="support-copy" class="support-copy" type="button"></button>
            </div>
            <div id="support-intl" class="support-intl" hidden></div>
            <div id="support-nudge-actions" class="support-nudge-actions" hidden>
                <button id="support-later" class="support-mini" type="button"></button>
                <button id="support-optout" class="support-mini" type="button"></button>
            </div>
        </section>

        <section class="modes" aria-labelledby="modes-title">
            <h2 id="modes-title" class="section-title"></h2>
            <div id="mode-cards" class="mode-cards" role="radiogroup"></div>
            <p id="channel-remembered" class="channel-remembered" hidden>
                <span id="channel-remembered-text"></span>
                <button type="button" id="channel-forget" class="channel-forget"></button>
            </p>
            <div id="channel-memory-rows" class="channel-memory-rows"></div>
            <p id="modes-note" class="modes-note"></p>
        </section>

        <section class="advanced">
            <button id="advanced-toggle" class="advanced-toggle" type="button" aria-expanded="false">
                <span id="advanced-label" class="advanced-label"></span>
                <svg class="chevron" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <div id="advanced-panel" class="advanced-panel" hidden>
                <div class="group">
                    <div id="indicator-rows" class="rows"></div>
                </div>
                <div class="group">
                    <p id="hexa-title" class="group-title"></p>
                    <div id="hexa-rows" class="rows"></div>
                </div>
            </div>
        </section>

        <section class="faq">
            <button id="faq-toggle" class="advanced-toggle" type="button" aria-expanded="false" aria-controls="faq-panel">
                <span id="faq-label" class="advanced-label"></span>
                <svg class="chevron" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <div id="faq-panel" class="advanced-panel" hidden></div>
        </section>

        <footer class="app-footer">
            <button id="reset" class="reset" type="button">
                <span id="reset-label" class="reset-label"></span>
                <span class="reset-fill" aria-hidden="true"></span>
            </button>
            <nav class="footer-links">
                <a id="about-link" class="footer-btn" href="https://github.com/joaogfc/ZeroDelay" target="_blank"
                    rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" />
                        <path d="M9 18c-4.51 2-5-2-7-2" />
                    </svg>
                    <span id="about-label"></span>
                </a>
                <a id="issue-link" class="footer-btn" href="https://github.com/joaogfc/ZeroDelay/issues"
                    target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        <path d="M12 7v2" />
                        <path d="M12 13h.01" />
                    </svg>
                    <span id="issue-label"></span>
                </a>
            </nav>
        </footer>
    </main>
</body>

</html>
