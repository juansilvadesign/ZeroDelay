<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    font-family: "Segoe UI", Roboto, system-ui, sans-serif; color: #fff;
    background:
      radial-gradient(82% 58% at 18% 6%, rgba(0, 175, 78, .45), transparent 55%),
      radial-gradient(95% 70% at 104% 102%, rgba(255, 210, 0, .22), transparent 52%),
      linear-gradient(160deg, #06381e, #041d0f 72%);
    display: flex; flex-direction: column; justify-content: space-between; padding: 82px 72px;
  }
  .brandrow { display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 15px; }
  .brand img { width: 68px; height: 68px; filter: drop-shadow(0 8px 20px rgba(0, 0, 0, .55)); }
  .brand .wm { font-size: 35px; font-weight: 800; letter-spacing: -.02em; }
  .brand .wm b { color: #FFD400; }
  .live { display: inline-flex; align-items: center; gap: 10px; font-size: 19px; font-weight: 800; color: #fff;
    background: rgba(0, 0, 0, .3); border: 1px solid rgba(255, 255, 255, .16); padding: 10px 16px; border-radius: 999px; letter-spacing: .03em; }
  .live i { width: 11px; height: 11px; border-radius: 50%; background: #ff3030; box-shadow: 0 0 0 4px rgba(255, 48, 48, .25); }
  .kicker { font-size: 25px; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; color: #FFD400; margin-bottom: 24px; }
  h1 { font-size: 98px; line-height: 1.02; font-weight: 800; letter-spacing: -.03em; }
  h1 .hl { color: #FFD400; }
  .sub { margin-top: 34px; font-size: 35px; line-height: 1.4; color: #c4e7cf; font-weight: 500; max-width: 900px; }
  .pill { display: inline-flex; align-items: center; gap: 13px; background: #FFD400; color: #05371d; font-weight: 800; font-size: 27px;
    padding: 19px 30px; border-radius: 999px; box-shadow: 0 18px 50px -16px rgba(255, 210, 0, .5); }
  .pill svg { width: 24px; height: 24px; }
</style></head><body>
  <div class="brandrow">
    <div class="brand"><img src="__LOGO__"><div class="wm">Zero<b>Delay</b></div></div>
    <div class="live"><i></i>LIVE · Sports</div>
  </div>
  <div class="mid">
    <div class="kicker">Stream running late</div>
    <h1>Your neighbor yells <span class="hl">GOAL</span> before you see it.</h1>
    <p class="sub">Watching live sports on YouTube, you're about 20s behind the TV broadcast.</p>
  </div>
  <div>
    <span class="pill">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7z"/></svg>
      Free on the Chrome Web Store
    </span>
  </div>
</body></html>
