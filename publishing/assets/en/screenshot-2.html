<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 800px; overflow: hidden; }
  body {
    font-family: "Segoe UI", Roboto, system-ui, sans-serif;
    background: radial-gradient(85% 80% at 50% -10%, rgba(255, 0, 51, .20), transparent 55%), #0a0a0c;
    color: #f5f5f7; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 44px;
  }
  .brand { position: absolute; top: 46px; left: 80px; display: flex; align-items: center; gap: 12px; }
  .brand img { width: 44px; height: 44px; filter: drop-shadow(0 6px 16px rgba(255, 0, 51, .5)); }
  .brand .wm { font-size: 23px; font-weight: 800; letter-spacing: -.02em; }
  .brand .wm b { color: #ff3355; }
  .head { text-align: center; max-width: 920px; }
  h1 { font-size: 52px; line-height: 1.07; font-weight: 800; letter-spacing: -.03em; margin-bottom: 16px; }
  h1 .hl { color: #ff3a59; }
  .head p { font-size: 20px; color: #c2c2cc; line-height: 1.45; }
  .player { width: 1000px; border-radius: 16px; overflow: hidden; border: 1px solid #232327; box-shadow: 0 40px 90px -30px rgba(0, 0, 0, .85); }
  .screen { height: 300px; background: radial-gradient(60% 130% at 50% 0%, #26262c, #0e0e10); display: flex; align-items: center; justify-content: center; }
  .screen .pl { width: 0; height: 0; border-left: 44px solid rgba(255, 255, 255, .9); border-top: 27px solid transparent; border-bottom: 27px solid transparent; filter: drop-shadow(0 6px 16px rgba(0, 0, 0, .5)); }
  .bar { background: #0f0f0f; padding-bottom: 16px; }
  .prog { height: 4px; background: #3a3a3a; position: relative; }
  .prog .fill { position: absolute; inset: 0; width: 88%; background: #ff0033; }
  .prog .knob { position: absolute; left: 88%; top: 50%; width: 14px; height: 14px; border-radius: 50%; background: #ff0033; transform: translate(-50%, -50%); }
  .ctrls { display: flex; align-items: center; gap: 18px; padding: 14px 20px 0; }
  .ctrls .i { width: 24px; height: 24px; color: #fff; opacity: .92; }
  .live { display: inline-flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 700; color: #fff; margin-left: 4px; }
  .live i { width: 9px; height: 9px; border-radius: 50%; background: #ff0033; display: inline-block; }
  .ind { position: relative; display: inline-flex; align-items: center; gap: 16px; margin-left: 10px; padding: 4px 6px; }
  .ind::after { content: ""; position: absolute; inset: -8px -10px; border: 2px dashed rgba(255, 0, 51, .6); border-radius: 12px; }
  .chip { font-size: 15px; font-weight: 600; color: #eaeaea; }
  .chip.rate { color: #ff8983; }
  .spacer { flex: 1; }
  .callout { margin-top: 16px; text-align: center; font-size: 15px; color: #ff6079; font-weight: 700; }
</style></head><body>
  <div class="brand"><img src="__LOGO__"><div class="wm">Zero<b>Delay</b></div></div>
  <div class="head">
    <h1>Live latency, <span class="hl">right in the player</span>.</h1>
    <p>Optional speed, latency and buffer indicators — right next to the LIVE badge, even in fullscreen.</p>
  </div>
  <div>
    <div class="player">
      <div class="screen"><div class="pl"></div></div>
      <div class="bar">
        <div class="prog"><div class="fill"></div><div class="knob"></div></div>
        <div class="ctrls">
          <svg class="i" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
          <svg class="i" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5l9 7-9 7zM16 5h2v14h-2z"/></svg>
          <svg class="i" viewBox="0 0 24 24" fill="currentColor"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 8a5 5 0 0 1 0 8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span class="live"><i></i>LIVE</span>
          <span class="ind">
            <span class="chip rate">1.25×</span>
            <span class="chip">2.4s</span>
            <span class="chip">5.1s</span>
          </span>
          <span class="spacer"></span>
          <svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7.8 7.8 0 0 0 0-2l2-1.5-2-3.4-2.3 1a7.6 7.6 0 0 0-1.7-1l-.3-2.6h-4l-.3 2.6c-.6.2-1.2.6-1.7 1l-2.3-1-2 3.4L4.6 11a7.8 7.8 0 0 0 0 2l-2 1.5 2 3.4 2.3-1c.5.4 1.1.8 1.7 1l.3 2.6h4l.3-2.6c.6-.2 1.2-.6 1.7-1l2.3 1 2-3.4z"/></svg>
          <svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
        </div>
      </div>
    </div>
    <div class="callout">↑ speed · latency · buffer — added by ZeroDelay</div>
  </div>
</body></html>
