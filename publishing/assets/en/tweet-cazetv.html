<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1600px; height: 900px; overflow: hidden; }
  body {
    font-family: "Segoe UI", Roboto, system-ui, sans-serif;
    background:
      radial-gradient(75% 110% at 14% -15%, rgba(255, 0, 51, .32), transparent 52%),
      radial-gradient(70% 110% at 108% 118%, rgba(255, 45, 82, .18), transparent 46%),
      #0a0a0c;
    color: #f5f5f7; display: grid; grid-template-columns: 1.22fr 1fr; align-items: center;
  }
  .left { padding: 0 80px; }
  .brand { display: flex; align-items: center; gap: 16px; margin-bottom: 34px; }
  .brand img { width: 70px; height: 70px; filter: drop-shadow(0 10px 24px rgba(255, 0, 51, .55)); }
  .brand .wm { font-size: 36px; font-weight: 800; letter-spacing: -.02em; }
  .brand .wm b { color: #ff3355; }
  h1 { font-size: 68px; line-height: 1.05; font-weight: 800; letter-spacing: -.03em; margin-bottom: 26px; }
  h1 .hl { color: #ff3a59; }
  p.sub { font-size: 26px; line-height: 1.45; color: #c6c6d0; max-width: 660px; margin-bottom: 30px; }
  .chip { display: inline-flex; align-items: center; gap: 11px; padding: 11px 18px; border-radius: 999px;
    background: rgba(255, 0, 51, .12); border: 1px solid rgba(255, 0, 51, .3); font-size: 19px; font-weight: 600; color: #ffd; }
  .chip .live { display: inline-flex; align-items: center; gap: 8px; color: #ff5d77; font-weight: 800; letter-spacing: .03em; }
  .chip .live i { width: 11px; height: 11px; border-radius: 50%; background: #ff0033; box-shadow: 0 0 0 4px rgba(255, 0, 51, .22); }
  .chip .at { color: #f5f5f7; }
  .right { height: 100%; display: flex; align-items: center; justify-content: center; }
  .card {
    width: 480px; background: linear-gradient(180deg, #191a1d, #111113); border: 1px solid #2c2c30;
    border-radius: 28px; padding: 40px; box-shadow: 0 40px 90px -30px rgba(255, 0, 51, .5), 0 14px 50px rgba(0, 0, 0, .55);
  }
  .live2 { display: inline-flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 800; color: #ff5d77;
    background: rgba(255, 0, 51, .14); padding: 8px 16px; border-radius: 999px; letter-spacing: .04em; }
  .live2 i { width: 11px; height: 11px; border-radius: 50%; background: #ff0033; box-shadow: 0 0 0 4px rgba(255, 0, 51, .2); }
  .lbl { margin-top: 28px; font-size: 16px; letter-spacing: .14em; color: #84848e; text-transform: uppercase; font-weight: 700; }
  .big { display: flex; align-items: baseline; gap: 18px; margin-top: 8px; }
  .big .old { color: #585860; font-size: 56px; font-weight: 800; text-decoration: line-through; }
  .big .arrow { font-size: 46px; color: #6a6a72; }
  .big .now { font-size: 112px; font-weight: 800; letter-spacing: -.04em; line-height: 1; color: #ff3a59; }
  .big .unit { font-size: 34px; color: #9a9aa4; font-weight: 600; }
  .delta { margin-top: 18px; display: flex; align-items: center; gap: 10px; font-size: 21px; color: #d6d6dc; }
  .delta b { color: #2ec27a; font-weight: 800; font-size: 24px; }
  .spark { margin-top: 22px; height: 70px; width: 100%; }
  .store { position: absolute; bottom: 42px; left: 80px; display: inline-flex; align-items: center; gap: 10px;
    font-size: 20px; font-weight: 700; color: #f5f5f7; }
  .store .b { color: #ff3a59; }
</style></head><body>
  <div class="left">
    <div class="brand"><img src="__LOGO__"><div class="wm">Zero<b>Delay</b></div></div>
    <h1>Your neighbor yells <span class="hl">GOAL</span><br>before you see it.</h1>
    <p class="sub">ZeroDelay cuts YouTube live-stream delay by up to 80% — no more lagging behind the TV broadcast. ⚽</p>
    <div class="chip"><span class="live"><i></i>LIVE</span><span class="at">live sports in real time</span></div>
  </div>
  <div class="right">
    <div class="card">
      <div class="live2"><i></i>LIVE</div>
      <div class="lbl">Live latency</div>
      <div class="big"><span class="old">20s</span><span class="arrow">→</span><span class="now">4.0</span><span class="unit">s</span></div>
      <div class="delta">▼ up to <b>−80%</b> closer to live</div>
      <svg class="spark" viewBox="0 0 400 70" preserveAspectRatio="none"><polyline points="0,8 75,14 140,40 210,53 280,60 400,63" fill="none" stroke="#ff3a59" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
  <div class="store"><span class="b">▸</span> Free on the Chrome Web Store</div>
</body></html>
