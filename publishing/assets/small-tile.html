<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 440px; height: 280px; overflow: hidden; }
    body {
      font-family: "Segoe UI", Roboto, system-ui, sans-serif;
      background:
        radial-gradient(120% 95% at 16% -10%, rgba(255, 0, 51, .30), transparent 55%),
        radial-gradient(120% 120% at 105% 110%, rgba(255, 45, 82, .15), transparent 50%),
        #0b0b0d;
      color: #f5f5f7;
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 0 32px;
    }
    .logo { width: 100px; height: 100px; flex: none; filter: drop-shadow(0 10px 24px rgba(255, 0, 51, .5)); }
    .name { font-size: 42px; font-weight: 800; letter-spacing: -.025em; line-height: 1; }
    .name b { color: #ff3355; }
    .tag { margin-top: 11px; font-size: 16px; color: #bdbdc6; font-weight: 500; line-height: 1.3; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 13px;
      padding: 5px 12px; border-radius: 999px;
      background: rgba(255, 0, 51, .16); color: #ff6079; font-size: 12px; font-weight: 700;
    }
  </style>
</head>

<body>
  <img class="logo" src="__LOGO__" alt="">
  <div>
    <div class="name">Zero<b>Delay</b></div>
    <div class="tag">Lives do YouTube<br>em tempo real</div>
    <div class="pill">▲ menos atraso</div>
  </div>
</body>

</html>
